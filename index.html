<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="logo"> Nutriplay 🍎</h1>
        <p class="subtitle">Educação nutricional de um jeito diferente</p>
        <h2 class="title">Escolha um tema para explorar:</h2>
    </header>
    <main>
        <section class="profiles" aria-label="Seleção de temas">
            <article class="profile" id="diabetes">
                <figure>
                    <img src="assets/diabetes.jpg" alt="Imagem do Tema diabetes">
                    <figcaption></figcaption>
                </figure>
            </article>
            <article class="profile" id="hipertensao">
                <figure>
                    <img src="assets/hipertensao.jpg" alt="Imagem do Tema hipertensao">
                    <figcaption></figcaption>
                </figure>
            </article>
            <article class="profile" id="obesidade">
                <figure>
                    <img src="assets/obesidade.jpg" alt="Imagem do Tema obesidade">
                    <figcaption></figcaption>
                </figure>
            </article>
        </section>
        <div id="content-area" class="content-area">
            <h2>Bem Vindo!</h2>
            <p>Escolha um tema acima para aprender mais sobre nutrição saudável.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
